<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Usuários</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        .container {
            margin-top: 50px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.3);
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-custom {
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            filter: brightness(1.1);
        }

        .table-container {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
        }

        table {
            color: #fff;
        }

        thead th {
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
        }

        tbody td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.15);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Lista de Usuários</h2>

        <div class="btn-group mb-4">
            <button id="voltar-button" class="btn btn-outline-light btn-custom">Voltar</button>
            <button id="cadastro-button" class="btn btn-outline-light btn-custom">Cadastro</button>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table class="table table-borderless">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Sobrenome</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="usuario-table-body">
                        <!-- Dados dos usuários serão inseridos aqui via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="listausuario.js"></script>
</body>

</html>
