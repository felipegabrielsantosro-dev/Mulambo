<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mulambo - Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            min-height: 100vh;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4);
            margin-bottom: 50px;
        }

        .card-dashboard {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
        }

        .card-dashboard:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.35);
        }

        .card-dashboard i {
            font-size: 4rem;
            margin-bottom: 20px;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .card-dashboard:hover i {
            transform: scale(1.2);
            color: #fff;
        }

        .btn-dashboard {
            font-weight: bold;
            width: 100%;
            padding: 15px 0;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .btn-dashboard:hover {
            filter: brightness(1.1);
        }

        /* Responsividade extra */
        @media (max-width: 576px) {
            .card-dashboard i {
                font-size: 3rem;
            }

            .btn-dashboard {
                padding: 12px 0;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <h1 class="text-center">Os Mulambo</h1>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-2 row-cols-lg-4 g-4">
            <!-- Produto -->
            <div class="col">
                <div class="card-dashboard">
                    <i class="bi bi-box-seam text-primary"></i>
                    <button id="product-button" class="btn btn-primary btn-dashboard">Produto</button>
                </div>
            </div>
            <!-- Usuário -->
            <div class="col">
                <div class="card-dashboard">
                    <i class="bi bi-person-fill text-success"></i>
                    <button id="usuario-button" class="btn btn-success btn-dashboard">Usuário</button>
                </div>
            </div>
            <!-- Cliente -->
            <div class="col">
                <div class="card-dashboard">
                    <i class="bi bi-people-fill text-warning"></i>
                    <button id="cliente-button" class="btn btn-warning btn-dashboard">Cliente</button>
                </div>
            </div>
            <!-- Fornecedor -->
            <div class="col">
                <div class="card-dashboard">
                    <i class="bi bi-truck text-danger"></i>
                    <button id="fornecedor-button" class="btn btn-danger btn-dashboard">Fornecedor</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="home.js"></script>
</body>

</html>
