<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- DataTables -->
    <link href="https://cdn.datatables.net/2.3.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/responsive/3.0.8/css/responsive.bootstrap5.min.css" rel="stylesheet">

    <title>Lista de Clientes</title>
</head>

<body class="bg-light">

    <div class="container mt-4">

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item">
                    <span onclick="window.electronAPI.openPage('index.html')" style="cursor:pointer;">
                        Home
                    </span>
                </li>
                <li class="breadcrumb-item active">Lista de clientes</li>
            </ol>
        </nav>

        <!-- Card -->
        <div class="card shadow-sm">

            <div class="card-header d-flex justify-content-between align-items-center">

                <h5 class="mb-0">Clientes cadastrados</h5>

                <button class="btn btn-primary" onclick="window.electronAPI.openPage('cliente.html')">
                    + Adicionar cliente
                </button>

            </div>

            <div class="card-body">

                <div class="table-responsive">

                    <table id="tabela" class="table table-striped table-hover align-middle">

                        <thead class="table-dark">
                            <tr>
                                <th style="width:100px;">Código</th>
                                <th>Nome</th>
                                <th>Data nascimento</th>
                            </tr>
                        </thead>

                        <tbody></tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- DataTables -->
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.bootstrap5.min.js"></script>

    <!-- Responsive -->
    <script src="https://cdn.datatables.net/responsive/3.0.8/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.8/js/responsive.bootstrap5.js"></script>

    <script type="module" src="listacliente.js"></script>

</body>

</html>
